<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Calculator</title>
  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>
<div class="host">
  <!-- PLUS -->
  <div>
    <input
      type="number"
      id="num1"
    >
    <span> + </span>
    <input
      type="number"
      id="num2"
    >
    <button onclick="calculateNumber()">=</button>

    <span id="result">0</span>
  </div>
 <div>
   <input
     type="number"
     id="num3"
     >
     <span> - </span>
     <input
      type="number"
      id="num4"
      >
      <button onclick="calculateMinus()">=</button>

      <span id="result2">0</span>
 </div>
  <!-- MINUS  -->
  <div>
    <input
      type="number"
      id="num5"
      >
    <span> * </span>
   <input
    type="number"
    id="num6"
    >
    <button onclick="calculateMultiply()">=</button>

    <span id="result3">0</span>
  </div>

  <!-- Multiply -->
  <div>
    <input
      type="number"
      id="num7"
      >
      <span> / </span>
     <input
      type="number"
      id="num8"
      >
      <button onclick="calculateDivision()">=</button>

      <span id="result4">0</span>
  </div>
<div class="host">
  <div class="calculator-box">
  </div>
</div>
  <!-- Division -->
  <div>
     <div style="display:none">
      hello world
      </div>
  </div>

</div>
